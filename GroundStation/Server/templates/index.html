<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Realtime 60s Tape Chart</title>

  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    #chart {
      max-width: 900px;
      margin: 40px auto;
    }
  </style>
</head>
<body>

<div id="chart"></div>

<script>
  const WINDOW_SIZE = 60000; // 60 segundos

  const options = {
    chart: {
      type: 'line',
      height: 350,
      animations: {
        enabled: true,
        easing: 'linear',
        dynamicAnimation: {
          speed: 1000 // sincronizado con los datos
        },
        animateGradually: {
          enabled: false
        }
      },
      toolbar: { show: false },
      zoom: { enabled: false }
    },

    series: [{
      name: 'Altitud',
      data: []
    }],

    xaxis: {
      type: 'datetime',
      range: WINDOW_SIZE,

      tickAmount: 2, // 👈 solo inicio y fin

      labels: {
        datetimeUTC: false,
        formatter: function (value, timestamp) {
          const d = new Date(timestamp);

          // formato estable y limpio
          return d.toLocaleTimeString([], {
            minute: '2-digit',
            second: '2-digit'
          });
        }
      }
    },

    yaxis: {
      title: {
        text: 'Altitud (m)'
      }
    },

    stroke: {
      curve: 'smooth',
      width: 2
    }
  };

  const chart = new ApexCharts(document.querySelector("#chart"), options);
  chart.render();

  function getNewPoint() {
    return {
      x: new Date().getTime(),
      y: Math.floor(Math.random() * 1000) + 100
    };
  }

  setInterval(() => {
    chart.appendData([{
      data: [getNewPoint()]
    }]);
  }, 1000);

</script>

</body>
</html>
