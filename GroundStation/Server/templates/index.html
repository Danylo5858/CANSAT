<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Large Subtle Loader</title>

<style>
body {
  background: #0a0f14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* Contenedor */
.loader {
  display: flex;
  gap: 10px; /* más espacio */
}

/* Cuadrados */
.loader div {
  width: 22px;
  height: 22px;
  background: #1a2a2f;
  border-radius: 3px;
  opacity: 0.35;
  animation: fade 1.6s ease-in-out infinite;
}

/* Delay progresivo */
.loader div:nth-child(1) { animation-delay: 0s; }
.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }
.loader div:nth-child(4) { animation-delay: 0.6s; }
.loader div:nth-child(5) { animation-delay: 0.8s; }
.loader div:nth-child(6) { animation-delay: 1s; }
.loader div:nth-child(7) { animation-delay: 1.2s; }
.loader div:nth-child(8) { animation-delay: 1.4s; }

/* Animación */
@keyframes fade {
  0%, 100% {
    opacity: 0.25;
  }
  50% {
    opacity: 1;
    background: #4fd1c5; /* verde suave */
  }
}

</style>
</head>
<body>

<div class="loader">
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>

</body>
</html>
