<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Square Loader</title>

<style>
body {
  background: #0a0f14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* Contenedor */
.loader {
  display: flex;
  gap: 6px;
}

/* Cuadrados */
.loader div {
  width: 14px;
  height: 14px;
  background: #0f2a2a;
  border-radius: 2px;
  box-shadow: inset 0 0 4px rgba(0,255,150,0.1);
  animation: pulse 1.2s linear infinite;
}

/* Delay escalonado (efecto flujo) */
.loader div:nth-child(1) { animation-delay: 0s; }
.loader div:nth-child(2) { animation-delay: 0.1s; }
.loader div:nth-child(3) { animation-delay: 0.2s; }
.loader div:nth-child(4) { animation-delay: 0.3s; }
.loader div:nth-child(5) { animation-delay: 0.4s; }
.loader div:nth-child(6) { animation-delay: 0.5s; }
.loader div:nth-child(7) { animation-delay: 0.6s; }
.loader div:nth-child(8) { animation-delay: 0.7s; }

/* Animación */
@keyframes pulse {
  0%, 100% {
    background: #0f2a2a;
    transform: scale(1);
    box-shadow: inset 0 0 4px rgba(0,255,150,0.1);
  }
  50% {
    background: #00ff9c;
    transform: scale(1.2);
    box-shadow: 0 0 10px #00ff9c, 0 0 20px rgba(0,255,150,0.5);
  }
}

</style>
</head>
<body>

<div class="loader">
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>

</body>
</html>
