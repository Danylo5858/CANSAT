<!DOCTYPE html>
<html lang="es">
<head>
  	<meta charset="UTF-8">
  	<title>GuazaSat</title>
  	<!-- Chart.js -->
  	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  	<script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  	<!-- ApexCharts -->
  	<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  	<!-- Socket.IO -->
  	<script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
          }
        }
    </script>
</head>
<body>
	<div id="cansat-charts" class="main-content charts-grid">
        <div id="chart_a"></div>
        <div id="chart_t"></div>
        <div id="chart_p"></div>
		<div id="chart_pa"></div>
	</div>
    <div id="ground-charts" class="main-content charts-grid hide">
        <div id="chart_aq"></div>
        <div id="chart_t_g"></div>
        <div id="chart_h"></div>
    </div>
    <div id="backup-config" class="main-content hide">
        <div class="backup-wrapper">

    <div class="backup-card">

        <div class="backup-header">
            <h2>Recuperación de registros</h2>
            <p>
                Extracción remota de datos y procesamiento analítico para generación de visualizaciones técnicas.
            </p>
        </div>

        <div class="backup-flow">

            <!-- INICIO -->
            <div class="time-block">
                <div class="block-label">Inicio</div>

                <div class="time-controls">
                    <div class="input-shell">
                        <input type="date" id="start-date">
                    </div>
                    <div class="input-shell">
                        <input type="time" id="start-time">
                    </div>
                </div>
            </div>

            <!-- FLOW -->
            <div class="flow-line">
                <div class="flow-pulse"></div>
            </div>

            <!-- FIN -->
            <div class="time-block">
                <div class="block-label">Fin</div>

                <div class="time-controls">
                    <div class="input-shell">
                        <input type="date" id="end-date">
                    </div>
                    <div class="input-shell">
                        <input type="time" id="end-time">
                    </div>
                </div>
            </div>

        </div>

        <!-- ERROR (VISIBLE POR DEFECTO PARA TEST) -->
        <div class="backup-error">
            Error de conexión: no se ha podido establecer comunicación con el dispositivo remoto.
        </div>

        <div class="backup-actions">
            <button onclick="generateInterval()" class="action-btn">
                Generar análisis en intervalo
            </button>

            <button onclick="generateFull()" class="action-btn">
                Procesar registro completo
            </button>
        </div>

        <div id="backup-loader" class="backup-loader hide">
            <div class="loader small">
                <div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div>
            </div>
        </div>

    </div>

</div>
    </div>
    <div class="sidebar">
        <button id="cansat-charts-btn" class="sidebar-btn active" onclick="handleSidebarAction(this)">
            Mostrar gráficos del CanSat
        </button>
        <button id="ground-charts-btn" class="sidebar-btn" onclick="handleSidebarAction(this)">
            Mostrar gráficos de la estación de tierra
        </button>
        <button id="backup-btn" class="sidebar-btn" onclick="handleSidebarAction(this)">
            Generar gráficos a partir de una copia de seguridad
        </button>
        <div id="viewer" class="sidebar-gyro-visualization"></div>
    </div>
    <div class="loader-container">
        <div class="center">
            <div class="loader">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </div>
    <script type="module" src="{{ url_for('static', filename='js/3D_visualization.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/backup.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
