<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Realtime Altitude Chart</title>

  <!-- ApexCharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    #chart {
      max-width: 800px;
      margin: 40px auto;
    }
  </style>
</head>
<body>

<div id="chart"></div>

<script>
  const WINDOW_SIZE = 20000; // 20s visibles

  const options = {
    chart: {
      type: 'line',
      height: 350,
      animations: {
        enabled: true,
        easing: 'linear',
        dynamicAnimation: {
          speed: 1000
        }
      },
      toolbar: { show: false },
      zoom: { enabled: false }
    },
    series: [{
      name: 'Altitud',
      data: []
    }],
    xaxis: {
      type: 'datetime',
      range: WINDOW_SIZE // 🔥 CLAVE: ventana fija
    },
    yaxis: {
      title: {
        text: 'Altitud (m)'
      }
    },
    stroke: {
      curve: 'smooth'
    }
  };

  const chart = new ApexCharts(document.querySelector("#chart"), options);
  chart.render();

  function getNewPoint() {
    return {
      x: new Date().getTime(),
      y: Math.floor(Math.random() * 1000) + 100
    };
  }

  setInterval(() => {
    chart.appendData([{
      data: [getNewPoint()]
    }]);
  }, 1000);
</script>

</body>
</html>
